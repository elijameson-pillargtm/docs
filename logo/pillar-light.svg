<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .bar { fill: #2D5BDA; }
    .bar1 { animation: pulse1 2.4s ease-in-out infinite; }
    .bar2 { animation: pulse2 2.4s ease-in-out infinite; }
    .bar3 { animation: pulse3 2.4s ease-in-out infinite; }
    @keyframes pulse1 {
      0%, 100% { height: 12px; y: 20px; }
      33% { height: 18px; y: 14px; }
      66% { height: 10px; y: 22px; }
    }
    @keyframes pulse2 {
      0%, 100% { height: 18px; y: 14px; }
      33% { height: 12px; y: 20px; }
      66% { height: 22px; y: 10px; }
    }
    @keyframes pulse3 {
      0%, 100% { height: 24px; y: 8px; }
      33% { height: 16px; y: 16px; }
      66% { height: 20px; y: 12px; }
    }
  </style>
  <rect class="bar bar1" x="4" y="20" width="6" height="12" rx="1.5"/>
  <rect class="bar bar2" x="13" y="14" width="6" height="18" rx="1.5"/>
  <rect class="bar bar3" x="22" y="8" width="6" height="24" rx="1.5"/>
</svg>
